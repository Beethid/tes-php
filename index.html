<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <form action="login/login.php" method="POST" class="form">
      <div class="mb-3"><h3 class="text-center">Login Menu</h3></div>
      <div class="mb-3 p-1 d-flex flex-column">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" type="text" placeholder="Insert username" />
      </div>
      <div class="mb-3 d-flex flex-column">
        <label class="form-label">Password</label class="form-label">
        <input name="password" class="form-control" type="password" placeholder="Insert Password" />
      </div>

      <div class="d-flex justify-content-center">
        <button type="submit" class="btn-primary btn w-100">Login</button>
      </div>
    </form>
  </body>
  <script>
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error') === '1') {
    alert('Login Gagal, silahkan coba lagi!');
  }
</script>
</html>
